# Workflow for ingesting Canada Federal Laws XML
#
# This is a safe, official source workflow that fetches structured XML data
# from the Government of Canada's laws website. It uses only safe, registered
# task types and does not involve any shell execution or arbitrary code.
#
# Source: https://laws-lois.justice.gc.ca/eng/
# Privacy Risk: Low (official government data, structured XML)
# Data Type: Legislation/Statutes

name: ingest_canada_federal_laws_xml
kind: ingestion
enabled: true

# Schedule: daily at 2 AM UTC
schedule: "0 2 * * *"

# Geographic scope
jurisdiction: "federal"
province: null
country: "Canada"

# Source configuration
source:
  source_key: "canada_federal_laws_xml"
  source_type: "official_government_open_data"
  lifecycle_state: "active"
  automation_status: "automated"

# Workflow steps - only safe, registered task types allowed
steps:
  - id: fetch_xml
    name: Fetch Laws XML
    uses: fetch_url
    with:
      url: "https://laws-lois.justice.gc.ca/eng/acts/"
      headers:
        User-Agent: "JudgeAtlasX/1.0 (legal-data-ingestion)"
      timeout_seconds: 300
      retry_max: 3
      retry_delay_seconds: 60

  - id: create_evidence_snapshot
    name: Create Evidence Snapshot
    uses: evidence_snapshot
    with:
      preserve_raw: true
      store_in_vault: true

  - id: parse_law_xml
    name: Parse Law XML
    uses: parse_law_xml
    with:
      parser_version: "1.0"
      extract_sections: true
      extract_amendments: true

  - id: resolve_entities
    name: Resolve Legal Entities
    uses: resolve_entities
    with:
      entity_types: ["jurisdiction", "court", "statute"]
      dedupe_by_name: true

  - id: extract_claims
    name: Extract Claims
    uses: extract_claims
    with:
      claim_types: ["statute", "amendment", "repeal"]
      confidence_threshold: 0.7

  - id: dedupe_events
    name: Deduplicate Events
    uses: dedupe_events
    with:
      dedupe_fields: ["title", "enacted_date", "jurisdiction"]
      fuzzy_match_threshold: 0.9

  - id: contradiction_check
    name: Check Contradictions
    uses: contradiction_check
    with:
      check_against: ["active_statutes", "recent_amendments"]
      severity_threshold: "medium"

  - id: confidence_score
    name: Score Confidence
    uses: confidence_score
    with:
      model: "legal_statute_v1"
      min_confidence: 0.6

  - id: legal_correlation
    name: Legal Correlation
    uses: legal_correlation
    with:
      correlation_types: ["law_change_case_topic_overlap"]
      confidence_threshold: 0.5

  - id: enqueue_review
    name: Enqueue for Review
    uses: enqueue_review
    with:
      review_queue: "legislation"
      auto_approve_threshold: 0.9
      require_manual_review: false

  - id: publish_map_layer
    name: Publish Map Layer
    uses: publish_map_layer
    with:
      layer_type: "legislation"
      publish_status: "public_safe"
      require_approval: true

# Review gate configuration
review_gate:
  required: true
  queue: "legislation"
  auto_approve_confidence: 0.95
  manual_review_confidence: 0.7
  block_below_confidence: 0.5

# Output configuration
outputs:
  artifacts:
    - name: raw_xml
      path: "raw/laws.xml"
      preserve: true
    - name: parsed_statutes
      path: "parsed/statutes.json"
      preserve: true
    - name: extracted_claims
      path: "claims/claims.json"
      preserve: true
    - name: contradictions_report
      path: "reports/contradictions.json"
      preserve: true

# Error handling
on_error:
  retry_steps: ["fetch_xml", "parse_law_xml", "extract_claims"]
  max_retries: 3
  retry_delay_seconds: 300
  notify_on_failure: true
  dead_letter_queue: true

# Metadata
metadata:
  version: "1.0"
  created_at: "2026-05-20"
  author: "Judge AtlasX Team"
  description: "Ingest Canada Federal Laws from official XML source"
  risk_level: "low"
  privacy_impact: "minimal"
