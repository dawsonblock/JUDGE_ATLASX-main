# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# EthicalCheck addresses the critical need to continuously test the security of APIs in development and production.

# EthicalCheck provides the industry’s only free & automated API security testing service that uncovers security vulnerabilities using the OWASP API Security list.
# Developers rely on EthicalCheck to evaluate every update and release, ensuring that no APIs go to production with exploitable vulnerabilities.

# You develop the application and API; we bring complete and continuous security testing to you, accelerating development.

# Know that your APIs and applications are secure with EthicalCheck – our free & automated API security testing service.

# How does EthicalCheck work?
# EthicalCheck functions in the following simple steps.
# 1. Security Testing.
# Provide your OpenAPI specification or start with a public Postman collection URL.
# EthicalCheck instantly introspects your API and creates a map of API endpoints for security testing.
# It then automatically creates hundreds of non-intrusive security tests to comprehensively test for authentication, authorization, and OWASP API Security risks in your API. The tests address the OWASP API Security categories, including OAuth 2.0, JWT, rate limiting, and more.

# 2. Reporting.
# EthicalCheck generates a security test report that includes all tested endpoints, a coverage graph, exceptions, and vulnerabilities.
# Vulnerabilities are fully triaged, including CVSS score, severity, endpoint information, and OWASP tagging.


# This is a starter workflow to help you get started with EthicalCheck Actions

name: EthicalCheck-Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # Customize trigger events based on your DevSecOps processes.
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '40 4 * * 4'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Trigger_EthicalCheck:
    permissions:
      contents: read
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest

    steps:
       - name: EthicalCheck  Free & Automated API Security Testing Service
         uses: apisec-inc/ethicalcheck-action@005fac321dd843682b1af6b72f30caaf9952c641
         with:
          # Repository variable containing the OpenAPI specification location.
          # Prefer an in-repo spec path (for example, ./openapi.yaml) or an HTTPS URL to this project's API spec.
          oas-url: ${{ vars.ETHICALCHECK_OAS_URL }}
          # Repository variable containing the email address to which the penetration test report will be sent.
          email: ${{ vars.ETHICALCHECK_EMAIL }}
          sarif-result-file: "ethicalcheck-results.sarif"

       - name: Upload sarif file to repository
         uses: github/codeql-action/upload-sarif@f3f5c2f4c1b0f6e0d4f8d7a6b9c3e2a1f0d9c8b7 # v3
         with:
          sarif_file: ./ethicalcheck-results.sarif

