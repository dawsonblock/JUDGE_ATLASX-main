name: Release Integrity Gates

on:
  pull_request:
  push:
    tags:
      - release-*
      - v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare backend virtual environment
        working-directory: ./backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Backend compile gate
        run: |
          source backend/.venv/bin/activate
          python -m compileall backend/app backend/tools scripts

      - name: Backend tests
        run: |
          source backend/.venv/bin/activate
          python -m pytest backend/app/tests --import-mode=importlib -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend lint
        working-directory: ./frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: ./frontend
        run: npm run typecheck

      - name: Frontend tests
        working-directory: ./frontend
        run: npm test -- --run

      - name: Frontend build
        working-directory: ./frontend
        run: npm run build

  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Prepare backend virtual environment
        working-directory: ./backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Source registry consistency
        run: |
          source backend/.venv/bin/activate
          python scripts/verify_source_registry.py --json

      - name: Required proof logs consistency
        run: |
          source backend/.venv/bin/activate
          python scripts/check_required_proof_logs.py --root . --strict-required-files

      - name: Proof consistency
        run: |
          source backend/.venv/bin/activate
          python scripts/check_proof_consistency.py

      - name: Proof freshness
        run: |
          source backend/.venv/bin/activate
          python scripts/check_proof_freshness.py

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Prepare backend virtual environment
        working-directory: ./backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend dependency audit triage gate
        run: |
          source backend/.venv/bin/activate
          python scripts/check_npm_audit_triage.py

      - name: Secret scan
        run: |
          if git grep -nE 'BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|xox[baprs]-' -- . ':!docs/archive/**' ':!external_reference/**'; then
            echo "SECRET_SCAN: FAIL"
            exit 1
          fi
          echo "SECRET_SCAN: PASS"

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [proof, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Prepare backend virtual environment
        working-directory: ./backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build and validate authoritative archive
        run: |
          bash scripts/package_and_validate_release_archive.sh \
            --archive-path "dist/JUDGE_ATLAS-main-final.zip"

      - name: Assert canonical final archive surface
        run: |
          test -f dist/JUDGE_ATLAS-main-final.zip
          test -f dist/JUDGE_ATLAS-main-final.zip.sha256
          test -f FINAL_RELEASE_HANDOFF.md
          python scripts/validate_final_zip.py dist/JUDGE_ATLAS-main-final.zip

      - name: Upload release proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-proof-current
          path: artifacts/proof/current/**
          retention-days: 30

      - name: Upload release archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-archive
          path: dist/JUDGE_ATLAS-main-final.zip
          retention-days: 30

      - name: Upload release archive checksum
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-archive-sha256
          path: dist/JUDGE_ATLAS-main-final.zip.sha256
          retention-days: 30

      - name: Upload authoritative handoff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-handoff
          path: FINAL_RELEASE_HANDOFF.md
          retention-days: 30

  fresh-extract-proof:
    name: Fresh Extract Proof
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: release-integrity-archive
          path: dist/

      - name: Assert downloaded canonical archive name
        run: |
          shopt -s nullglob
          archives=(dist/*.zip)
          test "${#archives[@]}" -eq 1
          test "${archives[0]}" = "dist/JUDGE_ATLAS-main-final.zip"

      - name: Download release checksum
        uses: actions/download-artifact@v4
        with:
          name: release-integrity-archive-sha256
          path: dist/

      - name: Download authoritative handoff
        uses: actions/download-artifact@v4
        with:
          name: release-integrity-handoff
          path: ./

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare backend virtual environment
        working-directory: ./backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate extracted release
        run: |
          source backend/.venv/bin/activate
          python scripts/validate_extracted_release.py \
            --root . \
            --archive dist/JUDGE_ATLAS-main-final.zip \
            --expected-root JUDGE_ATLAS-main

      - name: Upload final distributable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-final-distributable
          path: |
            dist/JUDGE_ATLAS-main-final.zip
            dist/JUDGE_ATLAS-main-final.zip.sha256
            FINAL_RELEASE_HANDOFF.md
          retention-days: 90
