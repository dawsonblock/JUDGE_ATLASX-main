name: CI Hard Gate

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hard-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[test]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Run proof regeneration
        run: |
          source ./backend/.venv/bin/activate
          python scripts/regenerate_proof.py --skip-db

      - name: Verify proof artifacts exist
        run: |
          test -f artifacts/proof/current/regeneration_summary.json
          test -f artifacts/proof/current/proof_manifest.json

      - name: Check proof freshness
        run: |
          source ./backend/.venv/bin/activate
          python scripts/check_proof_freshness.py

      - name: Check proof consistency
        run: |
          source ./backend/.venv/bin/activate
          python scripts/check_proof_consistency.py

      - name: Check single proof authority
        run: |
          source ./backend/.venv/bin/activate
          python scripts/check_single_proof_authority.py

      - name: Validate source registry
        run: |
          source ./backend/.venv/bin/activate
          python backend/tools/validate_sources.py

      - name: Check status truth consistency
        run: |
          source ./backend/.venv/bin/activate
          python scripts/check_status_truth_consistency.py

      - name: Verify release gate
        run: |
          source ./backend/.venv/bin/activate
          python scripts/release_gate.py

      - name: Check proof manifest required logs
        run: |
          source ./backend/.venv/bin/activate
          python scripts/check_proof_manifest.py

      - name: Hard Gate Summary
        if: always()
        run: |
          echo "========================================"
          echo "CI Hard Gate Complete"
          echo "========================================"
          echo "Proof artifacts: regenerated"
          echo "Source registry: validated"
          echo "Release gate: verified"
          echo ""
          echo "All checks must pass for merge approval"

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hard-gate-proof
          path: |
            artifacts/proof/current/**
          retention-days: 30
