# JUDGE_ATLASX Main Workflow Proof Artifact Reset And Cleanup

## Action

Follow the proof-artifact-reset-and-cleanup workflow:
1. Update .releaseignore or similar config to exclude unnecessary files from release artifacts
2. Truncate or reset in-progress proof artifact stubs (e.g., CURRENT_PROOF.md, FIX_VERIFICATION_REPORT.md, SOURCE_REGISTRY_STATUS.md)
3. Remove or regenerate completed or stale proof artifacts (e.g., backend_pytest_batch_X.xml, PROOF_POLICY.md, archive_validation.md, proof summaries)
4. Update docs and generated status/summary files to reflect the current proof state

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .releaseignore, artifacts/proof/current/CURRENT_PROOF.md, artifacts/proof/current/FIX_VERIFICATION_REPORT.md

